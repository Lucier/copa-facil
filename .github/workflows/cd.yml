name: CD

on:
  # Only deploy when CI passes on main — prevents broken commits from reaching production
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ${{ github.repository_owner }}/copa-facil

jobs:
  # Gate: abort immediately if CI failed
  gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding with deploy
        run: echo "CI workflow concluded with success. Deploying commit ${{ github.event.workflow_run.head_sha }}"

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-,format=short,enable=true
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/backend/Dockerfile
          target:     runner
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-,format=short,enable=true
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/frontend/Dockerfile
          target:     runner
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: production
      url: https://copafacil.com.br
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG:  sha-${{ github.event.workflow_run.head_sha }}
          REGISTRY:   ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          envs:     IMAGE_TAG,REGISTRY,COMMIT_SHA
          script: |
            set -euo pipefail
            cd /opt/copa-facil

            # Sync only compose + nginx config — no git reset --hard on production
            export IMAGE_TAG="${IMAGE_TAG}"
            export REGISTRY="${REGISTRY}"

            # Pull new images
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Ensure postgres is up (idempotent — no-op if already healthy)
            docker compose -f docker-compose.prod.yml up -d --wait postgres redis minio

            # Run pending DB migrations before taking traffic.
            # Exits non-zero on failure, aborting the deploy.
            docker compose -f docker-compose.prod.yml --profile migrate run --rm migrator

            # Rolling restart — backend first, then frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend
            sleep 15
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            # Verify backend health — fail the deploy if unhealthy after all retries
            HEALTHY=0
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null; then
                echo "Backend healthy after deploy (attempt $i)"
                HEALTHY=1
                break
              fi
              echo "Waiting for backend... ($i/5)"
              sleep 10
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "ERROR: Backend did not become healthy after deploy. Rolling back..."
              docker compose -f docker-compose.prod.yml up -d --no-deps backend --scale backend=0 || true
              exit 1
            fi

            # Prune images older than 24h
            docker image prune -f --filter "until=24h"

            echo "Deploy ${COMMIT_SHA} completed successfully."
