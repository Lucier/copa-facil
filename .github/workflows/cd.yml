name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ${{ github.repository_owner }}/cerrados-esportes

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/backend/Dockerfile
          target:     runner
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/frontend/Dockerfile
          target:     runner
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: production
      url: https://cerrados-esportes.com.br
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG:  sha-${{ github.sha }}
          REGISTRY:   ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          envs:     IMAGE_TAG,REGISTRY,COMMIT_SHA
          script: |
            set -e
            cd /opt/cerrados-esportes

            git fetch origin main
            git reset --hard origin/main

            export IMAGE_TAG="${IMAGE_TAG}"
            export REGISTRY="${REGISTRY}"

            # Pull new images
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Ensure postgres is up (idempotent — no-op if already healthy)
            docker compose -f docker-compose.prod.yml up -d --wait postgres

            # Run pending DB migrations before taking traffic.
            # The migrator service respects postgres healthcheck via depends_on.
            # Exits non-zero on failure, aborting the deploy.
            docker compose -f docker-compose.prod.yml --profile migrate run --rm migrator

            # Rolling restart — backend first, then frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend
            sleep 15
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            # Verify health after deploy
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3001/api/v1/health > /dev/null; then
                echo "Backend healthy after deploy (attempt $i)"
                break
              fi
              echo "Waiting for backend... ($i/5)"
              sleep 10
            done

            # Prune images older than 24h
            docker image prune -f --filter "until=24h"

            echo "Deploy ${COMMIT_SHA} completed."
