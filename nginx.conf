worker_processes  auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Structured JSON logging ──────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"tenant":"$tenant_id",'
            '"user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ─── Performance ──────────────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml;

    # ─── Security headers (applied globally) ─────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN                             always;
    add_header X-Content-Type-Options nosniff                                always;
    add_header X-XSS-Protection       "1; mode=block"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"      always;

    # ─── Rate limiting zones ──────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:20m     rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=general:20m rate=60r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Tenant extraction from subdomain ─────────────────────────────────────────
    # Host: equipe-gaucha.cerrados-esportes.com.br → $tenant_id = equipe-gaucha
    # Host: localhost or root domain          → $tenant_id = ""
    map $http_host $tenant_id {
        ~^(?<t>[^.]+)\.[^.]+\.[^.]+$ $t;
        default                        "";
    }

    # ─── Allowed CORS origins ─────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default                                          "";
        ~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$  $http_origin;
        ~^https://[a-z0-9-]+\.cerrados-esportes\.com\.br$      $http_origin;
    }

    # ─── Upstreams ────────────────────────────────────────────────────────────────
    upstream backend {
        server  backend:3001  max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream frontend {
        server  frontend:3000 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # ─── HTTP → HTTPS redirect (ACME challenge excepted) ─────────────────────────
    server {
        listen      80;
        server_name _ *.cerrados-esportes.com.br cerrados-esportes.com.br;

        # Let's Encrypt / Certbot renewal
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS server ─────────────────────────────────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name *.cerrados-esportes.com.br cerrados-esportes.com.br;

        # Cert paths — mount via Docker volume (see docker-compose.yml)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # HSTS — 1 year, include subdomains, preload-ready
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        client_max_body_size 50M;
        limit_conn conn_limit 200;

        # ── WebSocket / Socket.io ─────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID $tenant_id;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Payment webhooks (relaxed rate limit, no auth) ────────────────────────
        location /api/v1/webhooks/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID       $tenant_id;
            proxy_read_timeout 60s;
        }

        # ── Health check (no rate limit, no logging) ──────────────────────────────
        location = /api/v1/health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            access_log         off;
        }

        # ── REST API ──────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=80 nodelay;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Tenant-ID, X-API-Key" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length               0;
                return 204;
            }

            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID       $tenant_id;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Next.js static assets (cache forever, immutable) ──────────────────────
        location /_next/static/ {
            proxy_pass  http://frontend;
            expires     1y;
            add_header  Cache-Control "public, max-age=31536000, immutable";
            access_log  off;
        }

        # ── Frontend (all other requests) ─────────────────────────────────────────
        location / {
            limit_req zone=general burst=120 nodelay;

            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
