# Production compose — pull images built by CI/CD.
# Usage:
#   export IMAGE_TAG=sha-<commit>
#   export REGISTRY=ghcr.io/seu-org/cerrados-esportes
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cerrados_esportes_db
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  redis:
    image: redis:7-alpine
    container_name: cerrados_esportes_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    env_file: .env.production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$$REDIS_PASSWORD', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  minio:
    image: minio/minio:latest
    container_name: cerrados_esportes_minio
    command: server /data --console-address ":9001"
    env_file: .env.production
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  minio-init:
    image: minio/mc:latest
    container_name: cerrados_esportes_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.production
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/cerrados-esportes-assets &&
        mc mb --ignore-existing local/cerrados-esportes-documents &&
        mc anonymous set download local/cerrados-esportes-assets &&
        echo 'MinIO buckets initialized.'
      "
    restart: 'no'
    networks:
      - copa_internal

  backend:
    image: ${REGISTRY}-backend:${IMAGE_TAG:-latest}
    container_name: cerrados_esportes_backend
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '10'
    networks:
      - copa_internal

  frontend:
    image: ${REGISTRY}-frontend:${IMAGE_TAG:-latest}
    container_name: cerrados_esportes_frontend
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  nginx:
    image: nginx:alpine
    container_name: cerrados_esportes_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment to enable TLS:
      # - /etc/letsencrypt/live/cerrados-esportes.com.br:/etc/nginx/certs:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  # ─── Observability ────────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: cerrados_esportes_otel
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ./config/monitoring/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  prometheus:
    image: prom/prometheus:latest
    container_name: cerrados_esportes_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  grafana:
    image: grafana/grafana:latest
    container_name: cerrados_esportes_grafana
    env_file: .env.production
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3002:3000'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - copa_internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cerrados_esportes_pg_exporter
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - copa_internal

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: cerrados_esportes_redis_exporter
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - copa_internal

networks:
  copa_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
