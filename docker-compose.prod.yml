# Production compose — pull images built by CI/CD.
# Usage:
#   export IMAGE_TAG=sha-<commit>
#   export REGISTRY=ghcr.io/seu-org/copa-facil
#   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: copa_facil_db
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  pg-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: copa_facil_pg_backup
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - copa_internal

  redis:
    image: redis:7-alpine
    container_name: copa_facil_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    env_file: .env.production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$$REDIS_PASSWORD', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: copa_facil_minio
    command: server /data --console-address ":9001"
    env_file: .env.production
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T16-44-31Z
    container_name: copa_facil_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.production
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/copa-facil-assets &&
        mc mb --ignore-existing local/copa-facil-documents &&
        mc anonymous set download local/copa-facil-assets &&
        echo 'MinIO buckets initialized.'
      "
    restart: 'no'
    networks:
      - copa_internal

  migrator:
    image: ${REGISTRY}-backend:${IMAGE_TAG:-latest}
    container_name: copa_facil_migrator
    env_file: .env.production
    command: node apps/backend/dist/migrate.js
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate
    networks:
      - copa_internal

  backend:
    image: ${REGISTRY}-backend:${IMAGE_TAG:-latest}
    container_name: copa_facil_backend
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '10'
    networks:
      - copa_internal

  frontend:
    image: ${REGISTRY}-frontend:${IMAGE_TAG:-latest}
    container_name: copa_facil_frontend
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: copa_facil_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/${DOMAIN}:/etc/nginx/certs:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
      - copa_internal

  # ─── Observability ────────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: copa_facil_otel
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ./config/monitoring/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: copa_facil_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: '3'
    networks:
      - copa_internal

  grafana:
    image: grafana/grafana:11.6.1
    container_name: copa_facil_grafana
    env_file: .env.production
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # No host port — access via SSH tunnel:
    # ssh -L 3002:localhost:3000 user@server, then open localhost:3002
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - copa_internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: copa_facil_pg_exporter
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - copa_internal

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: copa_facil_redis_exporter
    env_file: .env.production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - copa_internal

networks:
  copa_internal:
    driver: bridge

volumes:
  postgres_data:
  pg_backups:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
