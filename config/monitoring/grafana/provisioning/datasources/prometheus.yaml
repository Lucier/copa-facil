apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    url:       http://prometheus:9090
    uid:       prometheus
    isDefault: true
    editable:  false
    jsonData:
      httpMethod:        POST
      prometheusType:    Prometheus
      prometheusVersion: 2.44.0
      timeInterval:      15s
