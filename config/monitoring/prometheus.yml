global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    app:         copa-facil

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # To enable alert delivery, add alertmanager to docker-compose.prod.yml and set:
      # targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # ─── OTEL Collector (NestJS app metrics via OpenTelemetry) ───────────────────
  - job_name: otel-collector
    honor_labels: true
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   backend

  # ─── PostgreSQL (postgres-exporter) ─────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: database
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   postgres

  # ─── Redis (redis-exporter) ──────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: cache
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   redis

  # ─── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: monitoring
