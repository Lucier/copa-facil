receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15

  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  resource:
    attributes:
      - key: service.name
        value: copa-facil-backend
        action: upsert
      - key: deployment.environment
        from_attribute: DEPLOYMENT_ENV
        action: insert

  # Drop noisy health-check spans
  filter/health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.route"] == "/api/v1/health"'

exporters:
  # Prometheus pull endpoint — scraped by Prometheus at :8889/metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    const_labels:
      app: copa-facil
    send_timestamps: true
    metric_expiration: 5m
    enable_open_metrics: true

  # Debug output (dev/staging only — remove in production if verbose)
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

service:
  telemetry:
    logs:
      level: warn

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, filter/health, batch]
      exporters:  [debug]

    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [prometheus]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [debug]
