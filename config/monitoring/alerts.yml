groups:
  - name: copa_facil_api
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_duration_milliseconds_count{http_status_code=~"5.."}[5m])) /
          sum(rate(http_server_duration_milliseconds_count[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate above 5%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_duration_milliseconds_bucket[5m])) by (le)
          ) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency above 2s"
          description: "p95 latency is {{ $value }}ms."

      - alert: BackendDown
        expr: up{job="otel-collector"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is unreachable"
          description: "The backend service has been unreachable for more than 1 minute."

  - name: copa_facil_postgres
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter cannot connect to the database."

      - alert: PostgresConnectionPoolNearSaturation
        expr: |
          pg_stat_activity_count{state="active"} /
          pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection pool above 80%"
          description: "{{ $value | humanizePercentage }} of max_connections are active."

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration{state="active"} > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Long-running Postgres transaction detected"
          description: "A transaction has been running for {{ $value }}s."

  - name: copa_facil_redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter cannot connect to the cache."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 85%"
          description: "Redis is using {{ $value | humanizePercentage }} of its memory limit."

  - name: copa_facil_infrastructure
    interval: 60s
    rules:
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} /
           node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on /."
